<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story — Near WW3</title>
    <meta name="description" content="Play an interactive terminal story with timed decisions." />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <a class="skipLink" href="#app">Skip to content</a>

    <main id="app" class="shell shellTall">
      <header class="topbar">
        <div class="brand">
          <a class="brandLink" href="./index.html" aria-label="Back to landing">
            <span class="brandMark" aria-hidden="true">▶</span>
            <span class="brandText">NEAR_WW3</span>
          </a>
        </div>
        <div class="topbarRight">
          <a class="brandLink" href="https://github.com/RobinTea" target="_blank">about</a>
        </div>
      </header>

      <section class="player">
        <div class="playerHeader">
          <div>
            <div id="routeLabel" class="routeLabel">ROUTE</div>
            <h1 id="sceneTitle" class="sceneTitle">Initializing…</h1>
          </div>
          <div class="topbarRight">
            <button id="restartBtn" class="ghostBtn" type="button">Restart</button>
          </div>
        </div>

        <div class="terminalWrap">
          <div id="terminal" class="terminal" role="log" aria-live="polite" aria-relevant="additions">
            <!-- lines injected -->
          </div>
        </div>

        <div class="choiceDock" aria-live="polite">
          <div class="dockHeader" aria-live="polite">
            <div id="hintLine" class="hintLine">Press Space to continue</div>
            <div id="timerLine" class="timerLine hidden">
              <span class="timerText">Decision timer:</span>
              <span id="timerValue" class="timerValue">--</span>
            </div>
          </div>
          <div id="countdownBar" class="countdownBar hidden" aria-hidden="true">
            <div id="countdownFill" class="countdownFill"></div>
          </div>
          <div id="choices" class="choices" role="group" aria-label="Choices">
            <!-- buttons injected -->
          </div>
        </div>
      </section>

      <footer class="footer footerTight">
        <p class="footerText">
          Space = continue | if you hesitate the highlighted option will be automaticly chosen
        </p>
      </footer>
    </main>

    <script src="./src/app.js" type="module"></script>
  </body>
</html>
