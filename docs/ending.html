<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ending — Near WW3</title>
    <meta name="description" content="Outcome summary with casualty estimates and epilogue." />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <a class="skipLink" href="#app">Skip to content</a>

    <main id="app" class="shell">
      <header class="topbar">
        <div class="brand">
          <a class="brandLink" href="./index.html" aria-label="Back to landing">
            <span class="brandMark" aria-hidden="true">◀</span>
            <span class="brandText">NEAR_WW3</span>
          </a>
        </div>
        <div class="topbarRight">
          <a class="brandLink" href="https://github.com/RobinTea" target="_blank">about</a>
        </div>
      </header>

      <section class="panel">
        <div class="endingHeader">
          <div class="routeLabel" id="endingRoute">ROUTE</div>
          <h1 class="panelTitle" id="endingTitle">Ending</h1>
          <p class="endingSubtitle" id="endingSubtitle">—</p>
        </div>

        <div class="endingGrid">
          <div class="endingBlock">
            <h2 class="blockTitle">What happened</h2>
            <p id="endingSummary" class="endingText"></p>
          </div>

          <div class="endingBlock">
            <h2 class="blockTitle">Estimated casualties</h2>
            <div class="statCard" role="group" aria-label="Estimated casualties">
              <div id="endingCasualtiesValue" class="statValue">—</div>
              <div id="endingCasualtiesNote" class="statNote">—</div>
            </div>
          </div>

          <div class="endingBlock">
            <h2 class="blockTitle">Real history</h2>
            <p id="endingRealLife" class="endingText"></p>
            <p id="endingCompared" class="endingNote"></p>
          </div>

          <div class="endingBlock endingBlockWide">
            <h2 class="blockTitle">What happens next (speculative)</h2>
            <p id="endingEpilogue" class="endingText"></p>
          </div>
        </div>

        <div class="ctaRow ctaRowEnd">
          <a id="replayBtn" class="primaryBtn asLink" href="./index.html">Play again</a>
          <a id="homeBtn" class="ghostBtn asLink" href="./index.html">Home</a>
        </div>
      </section>

      <footer class="footer">
        <p class="footerText">Thank you for playing.</p>
      </footer>
    </main>

    <script src="./src/app.js" type="module"></script>
  </body>
</html>
